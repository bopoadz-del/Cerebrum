# Render Deployment Configuration - SLIMMED DOWN VERSION
# Removed: Backup cron, Celery workers, Google Drive integration
# https://render.com/docs/blueprint-spec

services:
  # Backend API Service (Slimmed)
  - type: web
    name: cerebrum-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cerebrum-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: cerebrum-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: CORS_ORIGINS
        value: "https://cerebrum-frontend.onrender.com"
      - key: SENTRY_ENABLED
        value: "false"
      - key: USE_STUB_CONNECTORS
        value: "true"
      - key: PDP_ENABLED
        value: "false"
      - key: SLIM_MODE
        value: "true"
      - key: FRONTEND_URL
        value: "https://cerebrum-frontend.onrender.com"
      - key: PUBLIC_BASE_URL
        value: "https://cerebrum-api.onrender.com"
      - key: API_BASE_URL
        value: "https://cerebrum-api.onrender.com"
    healthCheckPath: /health/live
    dockerCommand: bash scripts/render_start.sh
    autoDeploy: true
    buildFilter:
      paths:
        - backend/**/*.py
        - backend/**/*.txt
        - backend/**/*.sh
        - backend/**/*.ini

  # Frontend (Vite React App)
  - type: web
    name: cerebrum-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: cerebrum-api
          envVarKey: RENDER_EXTERNAL_URL
    autoDeploy: true

  # KeyValue (Redis) Service
  - type: keyvalue
    name: cerebrum-redis
    plan: starter
    ipAllowList: []

databases:
  - name: cerebrum-db
    databaseName: cerebrum
    user: cerebrum
    plan: basic-256mb
    ipAllowList: []

version: "1"
